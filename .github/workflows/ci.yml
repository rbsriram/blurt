name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check blurt main.py tests

      - name: Import smoke test
        run: python -c "from blurt.app import create_app; create_app(); print('app builds')"

      # Offline unit tests only. The integration suite (docs/test_suite.py)
      # needs a live Ollama and is run locally, not in CI.
      - name: Unit tests
        run: pytest tests/test_unit.py -q
